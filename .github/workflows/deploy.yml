name: 自动部署后端服务（Deepseek 完整版）
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装 Node.js（和你本地版本一致，用 24.x）
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. 安装所有依赖（express、cors 等都会自动装）
      - name: 安装依赖
        run: npm install

      # 4. 启动服务器
      - name: 启动服务器
        run: node server.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
